<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login | Instituto Renova</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="login-logo">

                <img
                src="{{ url_for('static', filename='logo.png') }}"
                alt="Instituto Renova">

                <h1>Instituto Renova</h1>

                <p>
                    Plataforma Académica Virtual
                </p>

            </div>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Correo electrónico
                    </label>

                    <input
                    type="email"
                    name="correo"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Contraseña
                    </label>

                    <input
                    type="password"
                    name="password"
                    required>

                </div>

                <button type="submit">

                    Ingresar

                </button>

            </form>

        </div>

    </div>

</body>

</html>
