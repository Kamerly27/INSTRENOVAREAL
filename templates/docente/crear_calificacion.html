{% extends 'layout.html' %}

{% block title %}
Registrar nota | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Registrar nota</h1>
    <p>{{ examen.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Estudiante</label>

                <select name="estudiante_id" required>
                    <option value="">Seleccione un estudiante</option>

                    {% for estudiante in estudiantes %}
                    <option value="{{ estudiante.id }}">
                        {{ estudiante.nombre }} {{ estudiante.apellido }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Nota</label>
                <input type="number" step="0.1" min="0" max="5" name="nota" required>
            </div>

            <div class="form-group full">
                <label>Observación para el estudiante</label>
                <textarea name="observacion" placeholder="Escriba una observación o retroalimentación."></textarea>
            </div>

        </div>

        <button type="submit" class="btn-primary">
            Guardar nota
        </button>

    </form>

</div>

{% endblock %}
