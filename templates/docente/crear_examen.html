{% extends 'layout.html' %}

{% block title %}
Crear actividad / evaluación | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Crear actividad / evaluación</h1>
    <p>{{ modulo.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Título de la actividad / evaluación</label>
                <input
                type="text"
                name="titulo"
                placeholder="Ejemplo: Actividad - Plan personal de preparación"
                required>
            </div>

            <div class="form-group">
                <label>Fecha de inicio</label>
                <input
                type="date"
                name="fecha_inicio">
            </div>

            <div class="form-group">
                <label>Fecha de cierre</label>
                <input
                type="date"
                name="fecha_fin">
            </div>

            <div class="form-group">
                <label>Estado</label>

                <select
                name="activo"
                required>

                    <option value="1">
                        Activa
                    </option>

                    <option value="0">
                        Inactiva
                    </option>

                </select>

            </div>

            <div class="form-group full">
                <label>Descripción</label>

                <textarea
                name="descripcion"
                placeholder="Escriba una descripción breve de la actividad o evaluación."
                required></textarea>

            </div>

            <div class="form-group full">
                <label>Enlace opcional</label>

                <input
                type="text"
                name="enlace"
                placeholder="Puede pegar aquí el enlace del formulario, actividad o recurso">

            </div>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Crear actividad / evaluación

        </button>

    </form>

</div>

{% endblock %}
