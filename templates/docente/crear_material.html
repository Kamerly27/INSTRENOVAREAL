{% extends 'layout.html' %}

{% block title %}
Crear Material | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Crear Material</h1>
    <p>{{ modulo.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Título del material</label>
                <input type="text" name="titulo" required>
            </div>

            <div class="form-group">
                <label>Enlace o video</label>
                <input type="url" name="enlace" placeholder="https://...">
            </div>

            <div class="form-group full">
                <label>Descripción</label>
                <textarea name="descripcion" required></textarea>
            </div>

            <div class="form-group full">
                <label>Archivo PDF / guía / recurso</label>
                <input type="text" name="archivo" placeholder="Nombre o URL del archivo">
            </div>

        </div>

        <button type="submit" class="btn-primary">
            Crear material
        </button>

    </form>

</div>

{% endblock %}
