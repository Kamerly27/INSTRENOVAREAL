{% extends 'layout.html' %}

{% block title %}
Editar Actividad | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Editar Actividad</h1>
    <p>{{ modulo.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Título de la actividad</label>
                <input type="text" name="titulo" value="{{ actividad.titulo }}" required>
            </div>

            <div class="form-group">
                <label>Fecha de entrega</label>
                <input
                type="date"
                name="fecha_entrega"
                value="{{ actividad.fecha_entrega.strftime('%Y-%m-%d') if actividad.fecha_entrega else '' }}">
            </div>

            <div class="form-group full">
                <label>Descripción</label>
                <textarea name="descripcion" required>{{ actividad.descripcion }}</textarea>
            </div>

            <div class="form-group full">
                <label>Archivo o enlace de apoyo</label>
                <input
                type="text"
                name="archivo_url"
                value="{{ actividad.archivo_url or '' }}"
                placeholder="Enlace de Drive, PDF o recurso">
            </div>

        </div>

        <button type="submit" class="btn-primary">
            Guardar cambios
        </button>

    </form>

</div>

{% endblock %}
