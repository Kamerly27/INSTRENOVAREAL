{% extends 'layout.html' %}

{% block title %}
Editar actividad / evaluación | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Editar actividad / evaluación</h1>
    <p>{{ modulo.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Título de la actividad / evaluación</label>
                <input
                type="text"
                name="titulo"
                value="{{ examen.titulo }}"
                required>
            </div>

            <div class="form-group">
                <label>Fecha de inicio</label>
                <input
                type="date"
                name="fecha_inicio"
                value="{{ examen.fecha_inicio.strftime('%Y-%m-%d') if examen.fecha_inicio else '' }}">
            </div>

            <div class="form-group">
                <label>Fecha de cierre</label>
                <input
                type="date"
                name="fecha_fin"
                value="{{ examen.fecha_fin.strftime('%Y-%m-%d') if examen.fecha_fin else '' }}">
            </div>

            <div class="form-group">
                <label>Estado</label>

                <select name="activo" required>
                    <option value="1" {% if examen.activo %}selected{% endif %}>
                        Activa
                    </option>

                    <option value="0" {% if not examen.activo %}selected{% endif %}>
                        Inactiva
                    </option>
                </select>
            </div>

            <div class="form-group full">
                <label>Descripción</label>

                <textarea
                name="descripcion"
                required>{{ examen.descripcion }}</textarea>
            </div>

            <div class="form-group full">
                <label>Enlace opcional</label>

                <input
                type="text"
                name="enlace"
                value="{{ examen.enlace or '' }}"
                placeholder="Puede pegar aquí el enlace del formulario, actividad o recurso">
            </div>

        </div>

        <button type="submit" class="btn-primary">
            Guardar cambios
        </button>

    </form>

</div>

{% endblock %}
