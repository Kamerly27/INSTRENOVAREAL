{% extends 'layout.html' %}

{% block title %}
Editar Examen | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Editar Examen</h1>
    <p>{{ modulo.titulo }}</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Título del examen</label>
                <input
                type="text"
                name="titulo"
                value="{{ examen.titulo }}"
                required>
            </div>

            <div class="form-group">
                <label>Fecha de inicio</label>
                <input
                type="date"
                name="fecha_inicio"
                value="{{ examen.fecha_inicio.strftime('%Y-%m-%d') if examen.fecha_inicio else '' }}">
            </div>

            <div class="form-group">
                <label>Fecha de cierre</label>
                <input
                type="date"
                name="fecha_fin"
                value="{{ examen.fecha_fin.strftime('%Y-%m-%d') if examen.fecha_fin else '' }}">
            </div>

            <div class="form-group">
                <label>Estado</label>

                <select name="activo">

                    <option
                    value="1"
                    {% if examen.activo %}selected{% endif %}>
                        Activo
                    </option>

                    <option
                    value="0"
                    {% if not examen.activo %}selected{% endif %}>
                        Inactivo
                    </option>

                </select>
            </div>

            <div class="form-group full">
                <label>Descripción</label>

                <textarea
                name="descripcion"
                required>{{ examen.descripcion }}</textarea>
            </div>

            <div class="form-group full">
                <label>Enlace de Google Forms</label>

                <input
                type="text"
                name="enlace"
                value="{{ examen.enlace or '' }}"
                placeholder="https://docs.google.com/forms/...">
            </div>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Guardar cambios

        </button>

    </form>

</div>

{% endblock %}
