{% extends 'layout.html' %}

{% block title %}
Nuevo Mensaje | Instituto Renova
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Enviar mensaje</h1>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">

                <label>Destinatario</label>

                <select
                name="destinatario_id"
                required>

                    <option value="">
                        Seleccione
                    </option>

                    {% for usuario in usuarios %}

                    <option value="{{ usuario.id }}">

                        {{ usuario.nombre }}
                        {{ usuario.apellido }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group full">

                <label>Asunto</label>

                <input
                type="text"
                name="asunto"
                required>

            </div>

            <div class="form-group full">

                <label>Mensaje</label>

                <textarea
                name="contenido"
                required></textarea>

            </div>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Enviar mensaje

        </button>

    </form>

</div>

{% endblock %}
